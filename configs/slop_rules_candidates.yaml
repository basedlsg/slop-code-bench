# Candidate slop rules distilled from the 2026-04 verbose-pattern audit across
# 7 agent runs. Kept separate from slop_rules.yaml until they've been reviewed
# and calibrated against the benchmark corpus. Merge into slop_rules.yaml when
# ready.
---
id: except-bare-reraise
language: python
severity: warning
message: Catching an exception only to re-raise it adds noise; drop the try/except
metadata:
  weight: 3
  category: slop
rule:
  kind: except_clause
  has:
    kind: block
    regex: "^\\s*raise\\s*$"
---
id: except-pass-silence
language: python
severity: warning
message: except clause with bare pass silently swallows errors
metadata:
  weight: 4
  category: slop
rule:
  kind: except_clause
  has:
    kind: block
    has:
      kind: pass_statement
---
id: except-oserror-ioerror-pair
language: python
severity: warning
message: IOError is an alias for OSError since Py3.3; drop the pair
metadata:
  weight: 2
  category: slop
rule:
  kind: except_clause
  regex: "\\(OSError,\\s*IOError\\)|\\(IOError,\\s*OSError\\)"
---
id: pragma-no-cover-defensive
language: python
severity: warning
message: pragma no cover suppresses coverage on dead branches; remove the branch instead
metadata:
  weight: 3
  category: slop
rule:
  kind: comment
  regex: "pragma:\\s*no\\s+cover"
---
id: legacy-typing-capitalized-imports
language: python
severity: warning
message: Use built-in generics (list/dict/tuple, X | None) instead of typing.Dict/List/Optional/Tuple
metadata:
  weight: 3
  category: slop
rule:
  kind: import_from_statement
  all:
  - has:
      kind: dotted_name
      regex: "^typing$"
  - has:
      kind: dotted_name
      regex: "^(Dict|List|Optional|Tuple)$"
---
id: sorted-items-default-key
language: python
severity: warning
message: "sorted(d.items(), key=lambda i: i[0]) - default sort already sorts by key"
metadata:
  weight: 3
  category: slop
rule:
  pattern: "sorted($D.items(), key=lambda $I: $I[0])"
---
id: identity-dict-comprehension
language: python
severity: warning
message: "{k: v for k, v in d.items()} is just dict(d)"
metadata:
  weight: 3
  category: slop
rule:
  pattern: "{$K: $V for $K, $V in $D.items()}"
---
id: is-true-false-strict
language: python
severity: warning
message: is True / is False identity check - use truthiness
metadata:
  weight: 2
  category: slop
rule:
  kind: comparison_operator
  any:
  - pattern: $X is True
  - pattern: $X is False
  - pattern: $X is not True
  - pattern: $X is not False
---
id: lbyl-isfile-before-open
language: python
severity: warning
message: os.path.isfile guard before open is redundant and race-prone; use try/except OSError
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  all:
  - has:
      kind: call
      regex: "os\\.path\\.(isfile|exists)\\("
  - has:
      kind: block
      has:
        kind: with_statement
        regex: "open\\("
---
id: bool-numeric-triple-guard
language: python
severity: warning
message: isinstance bool guard combined with numeric isinstance - wrap in helper rather than inlining
metadata:
  weight: 3
  category: slop
rule:
  kind: boolean_operator
  regex: "isinstance\\([^,]+,\\s*bool\\).*isinstance"
---
id: per-method-assert-not-none
language: python
severity: hint
message: assert self.X is not None at method entry - enforce in __init__ once
metadata:
  weight: 2
  category: slop
rule:
  kind: assert_statement
  pattern: "assert self.$F is not None"
---
id: del-unused-param
language: python
severity: warning
message: del on a named parameter inside a function silences unused-param lint - drop from signature
metadata:
  weight: 3
  category: slop
rule:
  kind: delete_statement
  not:
    has:
      any:
      - kind: subscript
      - kind: attribute
      - kind: call
  inside:
    kind: function_definition
    stopBy: end
---
id: wrapper-isvalid-oneliner
language: python
severity: hint
message: One-line is_valid_X wrapping a regex match/search/fullmatch adds no value
metadata:
  weight: 2
  category: slop
rule:
  kind: function_definition
  all:
  - has:
      kind: identifier
      regex: "^is_valid"
  - has:
      kind: block
      has:
        kind: return_statement
        regex: "bool\\(.*\\.(match|fullmatch|search)\\("
---
id: manual-removeprefix-replace
language: python
severity: warning
message: s.replace(p, '') if s.startswith(p) else s - use str.removeprefix
metadata:
  weight: 3
  category: slop
rule:
  pattern: "$S.replace($P, $EMPTY) if $S.startswith($P) else $S"
---
id: returncode-int-cast
language: python
severity: warning
message: int(proc.returncode) - returncode is already int
metadata:
  weight: 2
  category: slop
rule:
  pattern: int($X.returncode)
---
id: stdout-or-if-stdout
language: python
severity: warning
message: (x or '') if x else '' - the 'or' branch already handles None
metadata:
  weight: 3
  category: slop
rule:
  pattern: "($X or $EMPTY) if $X else $EMPTY"
---
id: section-banner-comment
language: python
severity: warning
message: Decorative section banner comment - delete, let structure speak for itself
metadata:
  weight: 2
  category: slop
rule:
  kind: comment
  regex: "^#\\s*[-=\u2500]{10,}\\s*$"
---
id: validate-function-family
language: python
severity: hint
message: validate_X function family - 4+ siblings in one file suggests schema-driven refactor target
metadata:
  weight: 3
  category: slop
rule:
  kind: function_definition
  has:
    kind: identifier
    regex: "^validate_[a-z_]+$"
---
id: dataclass-count-explosion
language: python
severity: hint
message: "@dataclass decorator - 10+ in one file suggests TypedDict or consolidation target"
metadata:
  weight: 2
  category: slop
rule:
  kind: decorator
  regex: "^@dataclass"
